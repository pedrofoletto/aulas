name: Publicar Wiki com Quarto

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar o Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Instalar Python e dependências do Jupyter
        run: |
          python -m pip install --upgrade pip
          pip install jupyter matplotlib pandas numpy scipy scikit-learn

      - name: Compilar site com o Quarto
        uses: quarto-dev/quarto-actions/render@v2

      - name: Deploy para o GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs # Quarto compila para a pasta docs conforme _quarto.yml
